<svg xmlns="http://www.w3.org/2000/svg" width="940" height="394" viewBox="0 0 940 394" role="img" aria-labelledby="title desc"><title id="title">Profile introduction and facts</title><desc id="desc">Hobbyist developer profile introduction with uniform fact rows.</desc><style>
  .bg{fill:#0D1117}.soft{fill:#131B27;stroke:#344052;stroke-width:1}.fact{fill:#0D1117;stroke:#384252;stroke-width:1}.title{font:800 24px 'Segoe UI',Arial,sans-serif;fill:#F9FAFB}.body{font:600 14px 'Segoe UI',Arial,sans-serif;fill:#F9FAFB}.label{font:800 10px 'Segoe UI',Arial,sans-serif;fill:#D1D5DB;letter-spacing:.5px}.value{font:800 11px 'Segoe UI',Arial,sans-serif;fill:#F9FAFB}.accent{fill:#E2725B}.line{stroke:#2A3340;stroke-width:1}
</style><rect class="bg" width="940" height="394"/><circle cx="845" cy="64" r="46" fill="#E2725B" opacity="0.08"/><circle cx="828" cy="310" r="92" fill="#950015" opacity="0.10"/><circle cx="78" cy="306" r="68" fill="#950015" opacity="0.045"/><circle cx="716" cy="118" r="34" fill="#E2725B" opacity="0.035"/><rect x="38" y="34" width="864" height="300" rx="24" fill="#0F141B" stroke="#303A49"/><rect x="64" y="70" width="500" height="224" rx="16" class="soft"/><text x="92" y="111" class="title">Hobbyist developer moving toward IT.</text><line x1="92" y1="132" x2="526" y2="132" class="line"/><text x="92" y="166" class="body">I build practical Discord and web tooling while sharpening</text><text x="92" y="190" class="body">the habits that make software reliable: clear interfaces,</text><text x="92" y="214" class="body">maintainable TypeScript, sensible deployment and enough</text><text x="92" y="238" class="body">polish that the work feels intentional.</text><text x="92" y="270" class="body"><tspan font-weight="800">Current focus:</tspan><tspan dx="10">Spud Symphony, a Discord bot and website project.</tspan></text><rect x="594" y="70" width="282" height="224" rx="16" fill="#111821" stroke="#303A49"/><rect x="620" y="92" width="230" height="42" rx="9" class="fact"/><text x="638" y="110" class="label">BUILDING</text><text x="638" y="127" class="value accent">spud-symphony.com</text><rect x="620" y="144" width="230" height="42" rx="9" class="fact"/><text x="638" y="162" class="label">ROLE</text><text x="638" y="179" class="value">Hobbyist developer</text><rect x="620" y="196" width="230" height="42" rx="9" class="fact"/><text x="638" y="214" class="label">STACK</text><text x="638" y="231" class="value">HTML CSS JS TS React Tailwind C#</text><rect x="620" y="248" width="230" height="42" rx="9" fill="#160E16" stroke="#50303B"/><text x="638" y="266" class="label">DISCORD</text><text x="638" y="283" class="value">ssspudd</text><line x1="38" y1="364" x2="902" y2="364" stroke="#950015" stroke-width="3" opacity=".85"/></svg>
