<svg width="940" height="394" viewBox="0 0 940 394" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="40" y1="54" x2="900" y2="338" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101720"/>
      <stop offset="0.62" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#150C12"/>
    </linearGradient>
    <linearGradient id="accent" x1="74" y1="322" x2="866" y2="322" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2725B"/>
      <stop offset="0.58" stop-color="#950015"/>
      <stop offset="1" stop-color="#E2725B"/>
    </linearGradient>
    <clipPath id="leftClip">
      <rect x="82" y="88" width="480" height="196" rx="14"/>
    </clipPath>
    <clipPath id="factsClip">
      <rect x="594" y="76" width="270" height="230" rx="14"/>
    </clipPath>
    <style>
      .title { font: 800 23px Arial, Helvetica, sans-serif; fill: #F9FAFB; }
      .body { font: 700 13px Arial, Helvetica, sans-serif; fill: #F9FAFB; }
      .label { font: 800 11px Arial, Helvetica, sans-serif; letter-spacing: 0.5px; fill: #F9FAFB; }
      .value { font: 800 11px Arial, Helvetica, sans-serif; fill: #FF7A62; }
      .pillText { font: 800 10px Arial, Helvetica, sans-serif; fill: #F9FAFB; }
    </style>
  </defs>

  <rect width="940" height="394" fill="#0D1117"/>
  <circle cx="836" cy="70" r="39" fill="#E2725B" opacity="0.12"/>
  <circle cx="850" cy="306" r="84" fill="#950015" opacity="0.15"/>
  <circle cx="94" cy="310" r="64" fill="#950015" opacity="0.08"/>

  <rect x="42" y="48" width="856" height="290" rx="22" fill="url(#panel)" stroke="#2D3744"/>
  <rect x="62" y="72" width="816" height="238" rx="22" stroke="#263340"/>

  <g clip-path="url(#leftClip)">
    <rect x="82" y="88" width="480" height="196" rx="14" fill="#111927" stroke="#2D3A4A"/>
    <text x="108" y="122" class="title">Hobbyist developer</text>
    <text x="108" y="150" class="title">moving toward IT.</text>
    <line x1="108" y1="166" x2="514" y2="166" stroke="#2D3744"/>
    <text x="108" y="190" class="body">I build practical Discord and web tooling while sharpening</text>
    <text x="108" y="209" class="body">habits around clear interfaces, maintainable TypeScript,</text>
    <text x="108" y="228" class="body">sensible deployment, and polished project structure.</text>
    <text x="108" y="258" class="body">Current focus:</text>
    <text x="206" y="258" class="body">Spud Symphony, community tools,</text>
    <text x="206" y="277" class="body">dashboards, and server-facing automation.</text>
  </g>

  <g clip-path="url(#factsClip)">
    <rect x="594" y="76" width="270" height="230" rx="14" fill="#101720" stroke="#2D3A4A"/>

    <rect x="616" y="98" width="226" height="38" rx="8" fill="#0D1117" stroke="#344151"/>
    <text x="632" y="121" class="label">BUILDING</text>
    <text x="718" y="121" class="value">spud-symphony.com</text>

    <rect x="616" y="146" width="226" height="38" rx="8" fill="#0D1117" stroke="#344151"/>
    <text x="632" y="169" class="label">ROLE</text>
    <text x="718" y="169" class="value" fill="#F9FAFB">Hobbyist developer</text>

    <rect x="616" y="194" width="226" height="54" rx="8" fill="#0D1117" stroke="#344151"/>
    <text x="632" y="217" class="label">STACK</text>
    <text x="718" y="213" class="value" fill="#F9FAFB">HTML CSS JS TS</text>
    <text x="718" y="230" class="value" fill="#F9FAFB">React Tailwind C#</text>

    <rect x="616" y="258" width="226" height="38" rx="8" fill="#1B0D14" stroke="#7C2A34"/>
    <text x="632" y="281" class="label">DISCORD</text>
    <rect x="718" y="267" width="70" height="20" rx="8" fill="#223041"/>
    <text x="732" y="281" class="pillText">ssspudd</text>
  </g>

  <rect x="74" y="357" width="792" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
