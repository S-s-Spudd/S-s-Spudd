<title id="title">S-s-Spudd profile introduction panel</title><desc id="desc">A custom profile panel with introduction and profile facts.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0D1117"/><stop offset="1" stop-color="#151018"/></linearGradient><linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#950015"/><stop offset="1" stop-color="#E2725B"/></linearGradient></defs>
