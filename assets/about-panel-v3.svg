<rect x="50" y="72" width="528" height="240" rx="18" fill="#111827" stroke="#30363D"/><rect x="606" y="72" width="260" height="240" rx="18" fill="#121820" stroke="#30363D"/>
<text x="78" y="112" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">Hobbyist developer moving toward IT.</text><rect x="78" y="129" width="430" height="1" fill="#30363D"/>
<g fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600">
<text x="78" y="162">I build practical Discord and web tooling while sharpening the</text><text x="78" y="184">habits that make software reliable: clear interfaces,</text><text x="78" y="206">maintainable TypeScript, sensible deployment, and enough</text><text x="78" y="228">polish that the work feels intentional.</text>
<text x="78" y="268" font-weight="800">Current focus:</text><text x="188" y="268">Spud Symphony, a Discord bot and website</text><text x="78" y="290">project for community tools, dashboards, and automation.</text></g>
<g font-family="Segoe UI,Arial,sans-serif" font-size="12">
<rect x="626" y="94" width="220" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="642" y="116" fill="#F9FAFB" font-weight="800">Building</text><text x="715" y="116" fill="#E2725B" font-weight="700">spud-symphony.com</text>
<rect x="626" y="140" width="220" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="642" y="162" fill="#F9FAFB" font-weight="800">Role</text><text x="715" y="162" fill="#F9FAFB" font-weight="600">Hobbyist developer</text>
<rect x="626" y="186" width="220" height="58" rx="10" fill="#0D1117" stroke="#30363D"/><text x="642" y="210" fill="#F9FAFB" font-weight="800">Stack</text><text x="715" y="204" fill="#F9FAFB" font-weight="600">HTML, CSS, JS, TS</text><text x="715" y="224" fill="#F9FAFB" font-weight="600">React, Tailwind, C#</text>
<rect x="626" y="256" width="220" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="642" y="278" fill="#F9FAFB" font-weight="800">Discord</text><rect x="715" y="263" width="70" height="20" rx="8" fill="#1F2937"/><text x="726" y="277" fill="#F9FAFB" font-size="11" font-weight="700">ssspudd</text></g>
