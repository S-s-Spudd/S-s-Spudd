<svg xmlns="http://www.w3.org/2000/svg" width="940" height="390" viewBox="0 0 940 390" role="img" aria-labelledby="title desc">
<title id="title">S-s-Spudd profile introduction panel</title><desc id="desc">A custom profile panel with introduction and profile facts.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0D1117"/><stop offset="1" stop-color="#151018"/></linearGradient><linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#950015"/><stop offset="1" stop-color="#E2725B"/></linearGradient></defs>
<rect width="940" height="390" rx="28" fill="url(#bg)"/><rect x="22" y="22" width="896" height="346" rx="24" fill="#0F141B" stroke="#30363D"/><path d="M42 48h430" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
<rect x="50" y="76" width="548" height="238" rx="18" fill="#111827" stroke="#30363D"/><rect x="626" y="76" width="250" height="238" rx="18" fill="#121820" stroke="#30363D"/>
<text x="82" y="116" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="21" font-weight="800">Hobbyist developer moving toward IT.</text><rect x="82" y="133" width="430" height="1" fill="#30363D"/>
<g fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="600"><text x="82" y="166">I build practical Discord and web tooling while sharpening the</text><text x="82" y="188">habits that make software reliable: clear interfaces,</text><text x="82" y="210">maintainable TypeScript, sensible deployment, and enough</text><text x="82" y="232">polish that the work feels intentional.</text><text x="82" y="270" font-weight="800">Current focus:</text><text x="192" y="270">Spud Symphony, a Discord bot and website</text><text x="82" y="292">project for community tools, dashboards, and automation.</text></g>
<g font-family="Segoe UI,Arial,sans-serif" font-size="12"><rect x="646" y="98" width="210" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="662" y="120" fill="#F9FAFB" font-weight="800">Building</text><text x="728" y="120" fill="#E2725B" font-weight="700">spud-symphony.com</text><rect x="646" y="144" width="210" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="662" y="166" fill="#F9FAFB" font-weight="800">Role</text><text x="728" y="166" fill="#F9FAFB" font-weight="600">Hobbyist developer</text><rect x="646" y="190" width="210" height="62" rx="10" fill="#0D1117" stroke="#30363D"/><text x="662" y="216" fill="#F9FAFB" font-weight="800">Stack</text><text x="728" y="208" fill="#F9FAFB" font-weight="600">HTML, CSS, JS, TS</text><text x="728" y="230" fill="#F9FAFB" font-weight="600">React, Tailwind, C#</text><rect x="646" y="264" width="210" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="662" y="286" fill="#F9FAFB" font-weight="800">Discord</text><rect x="728" y="271" width="70" height="20" rx="8" fill="#1F2937"/><text x="739" y="285" fill="#F9FAFB" font-size="11" font-weight="700">ssspudd</text></g>
<circle cx="850" cy="58" r="42" fill="#E2725B" opacity=".08"/><circle cx="820" cy="326" r="84" fill="#950015" opacity=".08"/>
