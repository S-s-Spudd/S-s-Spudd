<rect x="50" y="72" width="510" height="218" rx="18" fill="#111827" stroke="#30363D"/><rect x="592" y="72" width="296" height="218" rx="18" fill="#121820" stroke="#30363D"/>
<text x="78" y="112" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="23" font-weight="800">Hobbyist developer moving toward IT.</text><rect x="78" y="129" width="430" height="1" fill="#30363D"/>
<g fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600">
<text x="78" y="162">I build practical Discord and web tooling while sharpening the</text><text x="78" y="184">habits that make software reliable: clear interfaces,</text><text x="78" y="206">maintainable TypeScript, sensible deployment, and enough</text><text x="78" y="228">polish that the work feels intentional.</text>
<text x="78" y="262" font-weight="800">Current focus:</text><text x="190" y="262">Spud Symphony, a Discord bot and website</text><text x="78" y="284">project for community tools, dashboards, and automation.</text></g>
<g font-family="Segoe UI,Arial,sans-serif" font-size="13">
<rect x="616" y="96" width="248" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="632" y="118" fill="#F9FAFB" font-weight="800">Building</text><text x="716" y="118" fill="#E2725B" font-weight="700">spud-symphony.com</text>
<rect x="616" y="142" width="248" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="632" y="164" fill="#F9FAFB" font-weight="800">Role</text><text x="716" y="164" fill="#F9FAFB" font-weight="600">Hobbyist developer</text>
<rect x="616" y="188" width="248" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="632" y="210" fill="#F9FAFB" font-weight="800">Stack</text><text x="716" y="210" fill="#F9FAFB" font-weight="600">React, TS, Tailwind, C#</text>
<rect x="616" y="234" width="248" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="632" y="256" fill="#F9FAFB" font-weight="800">Discord</text><rect x="716" y="241" width="70" height="20" rx="8" fill="#1F2937"/><text x="727" y="255" fill="#F9FAFB" font-size="12" font-weight="700">ssspudd</text></g>
