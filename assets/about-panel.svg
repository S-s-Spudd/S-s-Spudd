<svg xmlns="http://www.w3.org/2000/svg" width="940" height="280" viewBox="0 0 940 280" role="img" aria-labelledby="title desc">
<title id="title">S-s-Spudd profile introduction panel</title><desc id="desc">A custom profile panel with introduction and profile facts.</desc>
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0D1117"/><stop offset="1" stop-color="#151018"/></linearGradient>
<linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#950015"/><stop offset="1" stop-color="#E2725B"/></linearGradient>
<filter id="shadow" x="-10%" y="-20%" width="120%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity=".35"/></filter>
</defs>
<rect width="940" height="280" rx="28" fill="url(#bg)"/>
<rect x="18" y="18" width="904" height="244" rx="24" fill="#0F141B" stroke="#30363D"/>
<path d="M28 34h460" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
<g filter="url(#shadow)">
<rect x="38" y="54" width="506" height="176" rx="18" fill="#111827" stroke="#30363D"/>
<rect x="574" y="54" width="328" height="176" rx="18" fill="#121820" stroke="#30363D"/>
</g>
<text x="64" y="96" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="24" font-weight="800">Hobbyist developer moving toward IT.</text>
<rect x="64" y="112" width="420" height="1" fill="#30363D"/>
<text x="64" y="145" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="600">I build practical Discord and web tooling while sharpening the habits that</text>
<text x="64" y="168" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="600">make software reliable: clear interfaces, maintainable TypeScript, sensible</text>
<text x="64" y="191" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="600">deployment, and enough polish that the work feels intentional.</text>
<text x="64" y="222" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">Current focus:</text>
<text x="181" y="222" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="600">Spud Symphony, a Discord bot and website project</text>
<text x="64" y="245" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="600">for community tools, dashboards, and server-facing automation.</text>
<g font-family="Segoe UI,Arial,sans-serif" font-size="14">
<rect x="598" y="78" width="280" height="32" rx="10" fill="#0D1117" stroke="#30363D"/><text x="616" y="99" fill="#F9FAFB" font-weight="800">Building</text><text x="704" y="99" fill="#E2725B" font-weight="700">spud-symphony.com</text>
<rect x="598" y="120" width="280" height="32" rx="10" fill="#0D1117" stroke="#30363D"/><text x="616" y="141" fill="#F9FAFB" font-weight="800">Role</text><text x="704" y="141" fill="#F9FAFB" font-weight="600">Hobbyist developer, IT-bound</text>
<rect x="598" y="162" width="280" height="32" rx="10" fill="#0D1117" stroke="#30363D"/><text x="616" y="183" fill="#F9FAFB" font-weight="800">Stack</text><text x="704" y="183" fill="#F9FAFB" font-weight="600">React, TypeScript, Tailwind CSS, C#</text>
<rect x="598" y="204" width="280" height="32" rx="10" fill="#0D1117" stroke="#30363D"/><text x="616" y="225" fill="#F9FAFB" font-weight="800">Discord</text><rect x="704" y="211" width="72" height="20" rx="8" fill="#1F2937"/><text x="715" y="225" fill="#F9FAFB" font-size="12" font-weight="700">ssspudd</text>
</g>
<circle cx="876" cy="40" r="42" fill="#E2725B" opacity=".08"/><circle cx="832" cy="246" r="80" fill="#950015" opacity=".08"/>
</svg>
