<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430" role="img" aria-labelledby="title desc"><title id="title">Spud Symphony projects</title><desc id="desc">Website and Discord bot project cards inside a framed panel.</desc><style>
  .bg{fill:#0D1117}.panel{fill:#0F141B;stroke:#303A49;stroke-width:1}.card{fill:#121521;stroke:#333C4B;stroke-width:1}.iconbox{fill:#202B3C}.title{font:800 20px 'Segoe UI',Arial,sans-serif;fill:#F9FAFB}.body{font:700 13px 'Segoe UI',Arial,sans-serif;fill:#F9FAFB}.small{font:800 12px 'Segoe UI',Arial,sans-serif;fill:#E2725B}.line{stroke:#2A3340;stroke-width:1}
</style><rect class="bg" width="940" height="430"/><circle cx="845" cy="64" r="46" fill="#E2725B" opacity="0.08"/><circle cx="828" cy="360" r="92" fill="#950015" opacity="0.10"/><circle cx="78" cy="350" r="68" fill="#950015" opacity="0.045"/><circle cx="716" cy="118" r="34" fill="#E2725B" opacity="0.035"/><rect x="48" y="34" width="844" height="340" rx="24" class="panel"/><line x1="82" y1="64" x2="858" y2="64" class="line"/><rect x="84" y="94" width="362" height="218" rx="18" class="card"/><rect x="112" y="122" width="46" height="46" rx="12" class="iconbox"/><svg x="119" y="129" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E2725B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><text x="178" y="145" class="title">Spud Symphony Website</text><text x="178" y="184" class="body">A public-facing web surface for Spud Symphony.</text><text x="178" y="210" class="body">The work is about making server tools</text><text x="178" y="236" class="body">easier to understand, configure and trust.</text><text x="178" y="280" class="small" text-decoration="underline">Visit the site</text><rect x="494" y="94" width="362" height="218" rx="18" class="card"/><rect x="522" y="122" width="46" height="46" rx="12" class="iconbox"/><svg x="529" y="129" width="32" height="32" viewBox="0 0 24 24"><path fill="#E2725B" d="M20.317 4.369A19.79 19.79 0 0 0 15.397 3c-.22.39-.47.91-.64 1.32a18.27 18.27 0 0 0-5.51 0A13.7 13.7 0 0 0 8.597 3a19.74 19.74 0 0 0-4.92 1.369C.567 9.066-.333 13.64.087 18.15A19.95 19.95 0 0 0 6.057 21c.48-.65.91-1.34 1.28-2.06-.7-.26-1.37-.59-2-1 .17-.12.33-.25.49-.38 3.86 1.8 8.04 1.8 11.85 0 .16.13.32.26.49.38-.63.41-1.3.74-2.01 1 .37.72.8 1.41 1.28 2.06a19.9 19.9 0 0 0 5.98-2.85c.5-5.22-.86-9.75-3.1-13.78ZM8.02 15.38c-1.17 0-2.12-1.08-2.12-2.4s.93-2.4 2.12-2.4c1.18 0 2.14 1.08 2.12 2.4 0 1.32-.94 2.4-2.12 2.4Zm7.96 0c-1.17 0-2.12-1.08-2.12-2.4s.93-2.4 2.12-2.4c1.18 0 2.14 1.08 2.12 2.4 0 1.32-.94 2.4-2.12 2.4Z"/></svg><text x="588" y="145" class="title">Spud Symphony Bot</text><text x="588" y="184" class="body">Discord-side automation and community tooling.</text><text x="588" y="210" class="body">The goal is boring reliability with enough polish</text><text x="588" y="236" class="body">that server owners can actually use it.</text><text x="588" y="280" class="small" text-decoration="underline">Join the Discord</text><line x1="82" y1="344" x2="858" y2="344" stroke="#E2725B" stroke-width="2" opacity=".62"/></svg>
