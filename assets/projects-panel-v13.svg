    <rect x="514" y="116" width="44" height="44" rx="10" fill="#223041"/>
    <circle cx="536" cy="138" r="15" fill="#E2725B"/>
    <circle cx="530" cy="138" r="2.5" fill="#0D1117"/>
    <circle cx="542" cy="138" r="2.5" fill="#0D1117"/>
    <path d="M527 150C532 153 540 153 545 150" stroke="#0D1117" stroke-width="2" stroke-linecap="round"/>

    <text x="578" y="135" class="heading">Spud Symphony Bot</text>
    <text x="578" y="172" class="copy">Discord automation and community tooling.</text>
    <text x="578" y="193" class="copy">Built for boring reliability with enough</text>
    <text x="578" y="214" class="copy">polish for server owners to use.</text>
    <text x="578" y="254" class="link">Join the Discord</text>
