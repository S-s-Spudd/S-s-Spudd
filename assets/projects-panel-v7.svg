  <circle cx="716" cy="118" r="34" fill="#E2725B" opacity="0.035"/><rect x="58" y="54" width="380" height="220" rx="22" fill="#121521" stroke="#333C4B"/><rect x="88" y="82" width="44" height="44" rx="11" fill="#202B3C"/><svg x="94" y="88" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E2725B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><text x="150" y="104" class="h3">Spud Symphony Website</text><text x="150" y="142" class="body">A public-facing web surface for Spud Symphony.</text><text x="150" y="166" class="body">The work is about making server tools</text><text x="150" y="190" class="body">easier to understand, configure and trust.</text><text x="150" y="230" class="small accent" text-decoration="underline">Visit the site</text><rect x="502" y="54" width="380" height="220" rx="22" fill="#121521" stroke="#333C4B"/><rect x="532" y="82" width="44" height="44" rx="11" fill="#202B3C"/><svg x="538" y="88" width="32" height="32" viewBox="0 0 24 24"><path fill="#E2725B" d="M20.317 4.369A19.79 19.79 0 0 0 15.397 3c-.22.39-.47.91-.64 1.32a18.27 18.27 0 0 0-5.51 0A13.7 13.7 0 0 0 8.597 3a19.74 19.74 0 0 0-4.92 1.369C.567 9.066-.333 13.64.087 18.15A19.95 19.95 0 0 0 6.057 21c.48-.65.91-1.34 1.28-2.06-.7-.26-1.37-.59-2-1 .17-.12.33-.25.49-.38 3.86 1.8 8.04 1.8 11.85 0 .16.13.32.26.49.38-.63.41-1.3.74-2.01 1 .37.72.8 1.41 1.28 2.06a19.9 19.9 0 0 0 5.98-2.85c.5-5.22-.86-9.75-3.1-13.78ZM8.02 15.38c-1.17 0-2.12-1.08-2.12-2.4s.93-2.4 2.12-2.4c1.18 0 2.14 1.08 2.12 2.4 0 1.32-.94 2.4-2.12 2.4Zm7.96 0c-1.17 0-2.12-1.08-2.12-2.4s.93-2.4 2.12-2.4c1.18 0 2.14 1.08 2.12 2.4 0 1.32-.94 2.4-2.12 2.4Z"/></svg><text x="594" y="104" class="h3">Spud Symphony Bot</text><text x="594" y="142" class="body">Discord-side automation and community tooling.</text><text x="594" y="166" class="body">The goa