<text x="124" y="82" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">Spud Symphony Website</text><g fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600"><text x="124" y="116">A public-facing web surface for the Spud Symphony</text><text x="124" y="138">ecosystem. The work is about making server tools</text><text x="124" y="160">easier to understand, configure, and trust.</text></g><text x="124" y="194" fill="#E2725B" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Visit the site</text><path d="M124 200h78" stroke="#E2725B" stroke-width="1"/>
<text x="594" y="82" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="800">Spud Symphony Bot</text><g fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="600"><text x="594" y="116">Discord-side automation and community tooling.</text><text x="594" y="138">The goal is boring reliability with enough polish</text><text x="594" y="160">that server owners can actually use it.</text></g><text x="594" y="194" fill="#E2725B" font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Join the Discord</text><path d="M594 200h100" stroke="#E2725B" stroke-width="1"/><path d="M34 235h872" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity=".8"/></svg>
