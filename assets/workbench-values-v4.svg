<text x="476" y="128" fill="#F9FAFB" font-family="Segoe UI,Arial,sans-serif" font-size="21" font-weight="800">What I care about</text><g font-family="Segoe UI,Arial,sans-serif" font-size="12"><rect x="476" y="148" width="172" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><rect x="476" y="148" width="5" height="34" rx="3" fill="#E2725B"/><text x="496" y="170" fill="#F9FAFB" font-weight="800">Useful first</text><rect x="662" y="148" width="186" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="678" y="170" fill="#F9FAFB" font-weight="600">Tools solve server problems.</text><rect x="476" y="194" width="172" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><rect x="476" y="194" width="5" height="34" rx="3" fill="#950015"/><text x="496" y="216" fill="#F9FAFB" font-weight="800">Readable systems</text><rect x="662" y="194" width="186" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="678" y="216" fill="#F9FAFB" font-weight="600">Code and UI stay clear.</text><rect x="476" y="240" width="172" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><rect x="476" y="240" width="5" height="34" rx="3" fill="#E2725B"/><text x="496" y="262" fill="#E2725B" font-weight="800">Clean presentation</text><rect x="662" y="240" width="186" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="678" y="262" fill="#D1D5DB" font-weight="600">Surfaces feel intentional.</text><rect x="476" y="286" width="172" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><rect x="476" y="286" width="5" height="34" rx="3" fill="#950015"/><text x="496" y="308" fill="#E2725B" font-weight="800">Practical growth</text><rect x="662" y="286" width="186" height="34" rx="10" fill="#0D1117" stroke="#30363D"/><text x="678" y="308" fill="#D1D5DB" font-weight="600">Projects build IT habits.</text></g></svg>
